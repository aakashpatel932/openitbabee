<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>For Saanj 💖</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
      text-shadow: 0 0 15px white;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 25px #ff4d6d; }
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ffe6eb;
    }

    #question, #response {
      margin-top: 25px;
      font-size: 28px;
      display: none;
      animation: fadeIn 1s ease;
      text-shadow: 0 0 10px white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Hearts */
    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* Floating hearts background */
    .bg-heart {
      position: absolute;
      color: rgba(255,255,255,0.3);
      font-size: 30px;
      animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px);}
      50% { transform: translateY(-20px);}
      100% { transform: translateY(0px);}
    }
  </style>
</head>

<body>

  <h1>Hello Saanj 💖</h1>

  <button onclick="showQuestion()">Click here 💌</button>

  <div id="question">
    Saanj jevles ka bala? 🍽️💖 <br><br>

    <button onclick="answerYes()">Yes 💕</button>
    <button onclick="answerNo()">No 🥺</button>
  </div>

  <div id="response"></div>

  <script>
    function showQuestion() {
      document.getElementById("question").style.display = "block";
    }

    function answerYes() {
      document.getElementById("response").style.display = "block";
      document.getElementById("response").innerText = "Good girl 💖";
    }

    function answerNo() {
      document.getElementById("response").style.display = "block";
      document.getElementById("response").innerText = "Jevan karun ghe na bala please 💕";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "💖";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);

    // floating background hearts
    for (let i = 0; i < 15; i++) {
      let bg = document.createElement("div");
      bg.classList.add("bg-heart");
      bg.innerText = "💗";
      bg.style.left = Math.random() * 100 + "vw";
      bg.style.top = Math.random() * 100 + "vh";
      document.body.appendChild(bg);
    }
  </script>

</body>
</html>
